<!DOCTYPE html>
<html lang="en" class="dark">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Frontales MG - V2.0</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;700&display=swap"
        rel="stylesheet">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        "edia-cyan": "#00FDFF",
                        "mitsubishi-red": "#E60012",
                        "background-dark": "#000000",
                        "panel-dark": "#0A0A0A",
                        "surface-dark": "#111111",
                        "error": "#E60012",
                    },
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                        mono: ['JetBrains Mono', 'monospace'],
                    },
                    borderRadius: {
                        'none': '0',
                        'sm': '0.125rem',
                        'md': '0.25rem',
                        'lg': '0.5rem',
                    }
                }
            }
        }
    </script>
    <style>
        body {
            background-color: #000000;
            color: #ffffff;
            overflow: hidden;
        }

        ::-webkit-scrollbar {
            width: 4px;
            height: 4px;
        }

        ::-webkit-scrollbar-track {
            background: #000;
        }

        ::-webkit-scrollbar-thumb {
            background: #333;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: #00FDFF;
        }

        .scanline {
            width: 100%;
            height: 2px;
            background: rgba(0, 253, 255, 0.4);
            position: absolute;
            top: 0;
            left: 0;
            animation: scan 4s linear infinite;
            z-index: 10;
            pointer-events: none;
            box-shadow: 0 0 8px rgba(0, 253, 255, 0.6);
        }

        @keyframes scan {
            0% {
                top: 0%;
                opacity: 0;
            }

            5% {
                opacity: 1;
            }

            95% {
                opacity: 1;
            }

            100% {
                top: 100%;
                opacity: 0;
            }
        }

        .grid-overlay {
            background-size: 30px 30px;
            background-image:
                linear-gradient(to right, rgba(0, 253, 255, 0.03) 1px, transparent 1px),
                linear-gradient(to bottom, rgba(0, 253, 255, 0.03) 1px, transparent 1px);
        }

        @keyframes blink-urgent {

            0%,
            100% {
                opacity: 1;
                border-color: #E60012;
                box-shadow: 0 0 10px rgba(230, 0, 18, 0.5);
            }

            50% {
                opacity: 0.3;
                border-color: rgba(230, 0, 18, 0.2);
                box-shadow: 0 0 20px rgba(230, 0, 18, 0.9);
            }
        }

        .blink-urgent {
            animation: blink-urgent 0.8s ease-in-out infinite;
        }
    </style>
    <script type="importmap">
{
  "imports": {
    "react-dom/": "https://esm.sh/react-dom@^19.2.4/",
    "@google/genai": "https://esm.sh/@google/genai@^1.40.0",
    "react/": "https://esm.sh/react@^19.2.4/",
    "react": "https://esm.sh/react@^19.2.4"
  }
}
</script>
    <link rel="stylesheet" href="/index.css">
</head>

<body>
    <div id="root"></div>
    <script type="module" src="/index.tsx"></script>
</body>

</html>
